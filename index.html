<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2300b8d9' rx='20'/%3E%3Cpath d='M50 20 L50 80 M20 50 L80 50' stroke='white' stroke-width='12' stroke-linecap='round'/%3E%3C/svg%3E">
<title>سجل العلاج</title>
<style>
  #financialDate {
  display: block;
  margin-left: auto;
  margin-right: auto;
  margin-top: 3px;
  margin-bottom: 3px;
  text-align: center;
}
*{box-sizing:border-box}
body{font-family:Tahoma,Arial;margin:0;padding:10px;background:#d9d9d9;direction:rtl}

#quickNotesInput.warning-expired{background-color:#ffcccc;border:2px solid #e53935;color:#7f0000;font-weight:bold}
#searchCard{display:none;animation:fadeIn .3s ease}
#animalsReportCard{display:none;animation:fadeIn .3s ease}
#dataTable tbody tr{cursor:pointer}
#dataTable tbody tr:hover{background-color:#ffff00!important}
tr.data-missing{background-color:#ff0000!important;color:#000!important}

.table-container{overflow:auto;max-height:250px;position:relative}
#searchCard .table-container{max-height:70vh}
#animalsReportCard .table-container{max-height:70vh;overflow:auto}
table{width:100%;border-collapse:collapse;white-space:nowrap}
th{position:sticky;top:0;background-color:#f0f0f0;z-index:10;border:1px solid #ccc;padding:8px 4px;font-size:12px;text-align:center}
td{border:1px solid #ccc;padding:4px;font-size:12px;text-align:center}

#animalsReportTable th{background-color:#00b8d9;color:#fff}
#animalsReportTable td{font-size:13px;padding:8px 6px}
#animalsReportTable tr:nth-child(even){background-color:#e9f9fd}

.custom-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:2000}
.modal-box{background:#fff;padding:20px;border-radius:12px;width:320px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.2);animation:fadeIn .3s ease}
.modal-box h3{margin-bottom:10px;color:#333}
.modal-box p{margin-bottom:20px;color:#555;white-space:pre-line}
.modal-buttons{display:flex;justify-content:space-between;gap:10px}
.modal-buttons button{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.confirm-btn{background:#2bb673;color:#fff}
.cancel-btn{background:#e65050;color:#fff}
@keyframes fadeIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

#topAlertBadge{display:none;align-items:center;gap:7px;background:#e53935;color:#fff;border:none;border-radius:20px;padding:5px 14px 5px 10px;font-size:13px;font-weight:bold;cursor:pointer;animation:pulseBadge 1.4s infinite;box-shadow:0 2px 8px rgba(229,57,53,.4);white-space:nowrap}
#topAlertBadge.visible{display:flex}
#topAlertBadge .badge-icon{font-size:18px}
@keyframes pulseBadge{0%{box-shadow:0 0 0 0 rgba(229,57,53,.55)}70%{box-shadow:0 0 0 10px rgba(229,57,53,0)}100%{box-shadow:0 0 0 0 rgba(229,57,53,0)}}

input,select,textarea{text-align:center;padding:8px 10px;height:auto}
select{text-align-last:center}
#treatmentPlace{margin-bottom:20px;display:block;width:100%}
#dataUpdaterInput{margin-top:3px;margin-bottom:20px;display:block;width:100%}

.top-bar{display:flex;justify-content:space-between;align-items:center;gap:20px;background:#f8ffff;border:4px solid #00b8d9;padding:8px 10px;border-radius:4px;margin-bottom:12px;flex-wrap:wrap}
.top-group{display:flex;align-items:center;gap:8px}
.top-group label{font-weight:bold}
.top-group input{width:160px;padding:5px;border:2px solid #ddd;border-radius:3px}
.main-container{display:flex;gap:14px;align-items:flex-start}
.right-panel{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.card{background:#f8ffff;border:4px solid #00b8d9;border-radius:4px;padding:8px;display:flex;flex-direction:column}
.card h3{background:#00b8d9;color:#fff;padding:6px;text-align:center;margin:-8px -8px 8px -8px;font-size:1rem}
.row{display:flex;justify-content:space-between;margin:4px 0}
.row label{width:100px}
input,select{padding:4px 6px;border:2px solid #ddd;border-radius:3px;font-size:13px}
.row input,.row select{width:150px}
.diagnosis-row{display:grid;grid-template-columns:2fr 1fr .7fr;gap:6px;margin:4px 0}
.diagnosis-row select,.diagnosis-row input{width:100%;font-size:12px;padding:5px}
.drug-row{display:grid;grid-template-columns:2.5fr 1fr;gap:6px;margin:4px 0}
.drug-row input,.drug-row select{width:100%}
.animals-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.animal-item{display:flex;align-items:center;gap:5px;font-size:13px}
.animal-item label{width:50px}
.animal-item input{width:80px}
textarea{width:100%;height:70px;margin-top:5px;font-size:12px;padding:5px}
.full-width{grid-column:1/-1}
.btns{display:flex;justify-content:center;gap:12px;margin:4px 0;flex-wrap:wrap}
button{padding:8px 20px;border:0;border-radius:5px;font-weight:bold;cursor:pointer}
button:disabled{opacity:.6;cursor:not-allowed}
.save{background:#2bb673;color:#fff}
.clear{background:#ffb347;color:#fff}
.close{background:#000;color:#fff}
input[readonly]{background-color:#f0f0f0;cursor:default}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;box-shadow:0 2px 10px rgba(0,0,0,.2);transition:opacity .3s ease;opacity:0;pointer-events:none;white-space:pre-line;max-width:420px;text-align:right}
.toast.success{background-color:#2bb673}
.toast.error{background-color:#e65050}
.toast.show{opacity:1}

.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:10000}
.setup-box{background:#fff;padding:24px;border-radius:8px;max-width:500px;width:90%}
.setup-box h3{margin-top:0;color:#00b8d9}
.setup-box input{width:100%;padding:8px;margin:10px 0;border:2px solid #ddd;border-radius:4px}
.setup-box button{background:#2bb673;color:#fff;padding:10px 20px;width:100%;border:0;border-radius:5px;font-weight:bold;cursor:pointer}

@media(max-width:1100px){.main-container{flex-direction:column}.right-panel{grid-template-columns:1fr}}
</style>
</head>
<body>

  <div><button onclick="changeApiUrl()" style="background:#7f8c8d;color:#fff;padding:4px 10px;font-size:11px;">⚙️ الرابط</button></div>

      <div class="diagnosis-row"><input list="diseaseList" placeholder="المرض"><input list="typeListFixed" placeholder="نوع الحيوان"><input type="number" placeholder="العدد"></div>
      <div class="diagnosis-row"><input list="diseaseList" placeholder="المرض"><input list="typeListFixed" placeholder="نوع الحيوان"><input type="number" placeholder="العدد"></div>

      <div class="drug-row"><input list="drugList" class="drug-input" placeholder="دواء"><input type="number" class="drug-qty" placeholder="الكمية"></div>

<script>
"use strict";

// ===== API Setup =====
var API_URL = localStorage.getItem("treatment_api_url") || "";
if (!API_URL) document.getElementById("setupOverlay").style.display = "flex";

function saveApiUrl() {
  var url = document.getElementById("apiUrlInput").value.trim();
  if (!url) { alert("الرجاء إدخال الرابط"); return; }
  localStorage.setItem("treatment_api_url", url);
  API_URL = url;
  document.getElementById("setupOverlay").style.display = "none";
  init();
}
function changeApiUrl() {
  document.getElementById("apiUrlInput").value = API_URL;
  document.getElementById("setupOverlay").style.display = "flex";
}

async function callApi(action, payload) {
  if (!API_URL) throw new Error("رابط الخدمة غير مُعدّ");
  var body = JSON.stringify(Object.assign({ action: action }, payload || {}));
  var response = await fetch(API_URL, { method:"POST", mode:"cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:body, redirect:"follow" });
  if (!response.ok) throw new Error("HTTP " + response.status);
  return await response.json();
}

// ===== UI Helpers =====
function showMessage(msg, isError) {
  var old = document.querySelector(".toast"); if (old) old.remove();
  var t = document.createElement("div");
  t.className = "toast " + (isError ? "error" : "success");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.classList.add("show"); }, 10);
  setTimeout(function(){ t.classList.remove("show"); setTimeout(function(){ t.remove(); }, 300); }, 4000);
}

function showConfirm(msg, onConfirm) {
  var modal = document.createElement("div"); modal.className = "custom-modal";
  modal.innerHTML = '<div class="modal-box"><h3>تأكيد</h3><p>'+msg+'</p><div class="modal-buttons"><button class="confirm-btn">نعم</button><button class="cancel-btn">إلغاء</button></div></div>';
  document.body.appendChild(modal);
  modal.querySelector(".confirm-btn").onclick = function(){ modal.remove(); onConfirm(); };
  modal.querySelector(".cancel-btn").onclick = function(){ modal.remove(); };
}

function safeSet(id, val) { var el = document.getElementById(id); if (el) el.value = (val != null) ? val : ""; }
function getValue(id) { var el = document.getElementById(id); return el ? el.value.trim() : ""; }

// ===== Alerts =====
var _expiredWarning = null, _specialNote = "";

function refreshTopBadge() {
  var badge = document.getElementById("topAlertBadge"), txt = document.getElementById("topAlertText");
  var msgs = [];
  if (_expiredWarning) msgs.push(_expiredWarning);
  if (_specialNote) msgs.push("تنبية: " + _specialNote);
  if (msgs.length > 0) { txt.textContent = msgs.length === 1 ? msgs[0] : "تنبيهات (" + msgs.length + ")"; badge.classList.add("visible"); }
  else badge.classList.remove("visible");
}
document.getElementById("topAlertBadge").addEventListener("click", function() {
  var msgs = [];
  if (_expiredWarning) msgs.push(_expiredWarning);
  if (_specialNote) msgs.push("\n" + _specialNote);
  if (msgs.length === 0) return;
  var modal = document.createElement("div"); modal.className = "custom-modal";
  modal.innerHTML = '<div class="modal-box"><h3>⚠️ تنبيهات</h3><p>'+msgs.join("\n\n")+'</p><div class="modal-buttons"><button class="confirm-btn" style="background:#3498db">حسناً</button></div></div>';
  document.body.appendChild(modal);
  modal.querySelector(".confirm-btn").onclick = function(){ modal.remove(); };
});

function checkQuickNotesDate(dateStr) {
  var field = document.getElementById("quickNotesInput");
  if (field) field.classList.remove("warning-expired");
  _expiredWarning = null;
  if (!dateStr || dateStr.trim() === "") { refreshTopBadge(); return; }
  var parts = dateStr.trim().split("/");
  if (parts.length !== 3) { refreshTopBadge(); return; }
  var expireDate = new Date(parseInt(parts[2],10), parseInt(parts[1],10)-1, parseInt(parts[0],10));
  if (isNaN(expireDate.getTime())) { refreshTopBadge(); return; }
  var today = new Date(); today.setHours(0,0,0,0);
  var diffDays = Math.ceil((expireDate.getTime() - today.getTime()) / 86400000);
  if (diffDays < 0) {
    if (field) field.classList.add("warning-expired");
    _expiredWarning = "⛔ تاريخ الحيازة منتهٍ منذ " + Math.abs(diffDays) + " يوم";
  }
  refreshTopBadge();
}

function setSpecialNote(val) {
  _specialNote = (val || "").trim();
  var f = document.getElementById("specialNotesInput"); if (f) f.value = _specialNote;
  refreshTopBadge();
}

// ===== Fetch breeder =====
async function fetchBreederData(phone) {
  var ids = ["nameInput","possessionInput","regionInput","civilInput","quickNotesInput"];
  if (!phone) { ids.forEach(function(id){ var el=document.getElementById(id); if(el){el.value="";el.classList.remove("warning-expired");} }); _expiredWarning=null; setSpecialNote(""); return; }
  try {
    var res = await callApi("getBreederData", { phone: phone });
    if (res.success && res.data && res.data.length > 0) {
      ids.forEach(function(id, i){ var el=document.getElementById(id); if(el) el.value = res.data[i] || ""; });
      checkQuickNotesDate(res.data[4]);
    } else {
      ids.forEach(function(id){ var el=document.getElementById(id); if(el){el.value="";} });
      _expiredWarning=null; setSpecialNote("");
      showMessage("لم يتم العثور على بيانات لهذا الرقم", true);
    }
    // Unpaid cases
    var ucRes = await callApi("getUnpaidCasesCount", { phone: phone });
    if (ucRes.success && ucRes.count > 0) {
      setSpecialNote("⛔ تم علاج " + ucRes.count + " حالات لهذا المربي دون وجود حيازة حيوانية.");
    } else setSpecialNote("");
  } catch(err) { showMessage("خطأ: " + err.message, true); }
}

// ===== Fill / Clear / Collect =====
function fillFormWithData(data) {
  try {
    safeSet("caseNumber", data.caseNumber); updateMirrorCaseNumber();
    safeSet("phoneInput", data.phone); safeSet("nameInput", data.name);
    safeSet("possessionInput", data.possession); safeSet("regionInput", data.region);
    safeSet("civilInput", data.civil); safeSet("dataUpdaterInput", data.dataUpdater);
    var dRows = document.querySelectorAll(".diagnosis-row");
    for (var i=0;i<dRows.length;i++) {
      var inp = dRows[i].querySelectorAll("input");
      if(inp[0]) inp[0].value = (data.diseases&&data.diseases[i])||"";
      if(inp[1]) inp[1].value = (data.types&&data.types[i])||"";
      if(inp[2]) inp[2].value = (data.diseaseCounts&&data.diseaseCounts[i])||"";
    }
    var drugRows = document.querySelectorAll(".drug-row");
    for (var j=0;j<drugRows.length;j++) {
      var di=drugRows[j].querySelector(".drug-input"), qi=drugRows[j].querySelector(".drug-qty");
      if(di) di.value = (data.drugs&&data.drugs[j])||"";
      if(qi) qi.value = (data.drugQuantities&&data.drugQuantities[j])||"";
    }
    safeSet("treatmentPlace", data.treatmentPlace); safeSet("notes", data.notes);
    safeSet("dataEntryInput", data.dataEntry);
    if (data.animals) {
      safeSet("animal_goat",data.animals.goat); safeSet("animal_sheep",data.animals.sheep);
      safeSet("animal_cow",data.animals.cow); safeSet("animal_camel",data.animals.camel);
      safeSet("animal_horse",data.animals.horse); safeSet("animal_cat",data.animals.cat);
      safeSet("animal_dog",data.animals.dog); safeSet("animal_poultry",data.animals.poultry);
    }
    safeSet("receipt", data.receipt); safeSet("amount", data.amount); safeSet("financialDate", data.financialDate);
  } catch(e) { showMessage("خطأ في التعبئة: " + e.message, true); }
}

function clearForm() {
  document.getElementById("caseNumber").value = "";
  document.getElementById("mirrorCaseNumber").value = "";
  document.getElementById("dataUpdaterInput").value = "";
  document.getElementById("phoneInput").value = "";
  document.getElementById("financialDate").value = new Date().toLocaleDateString("en-CA");
  fetchBreederData("");
  document.querySelectorAll(".diagnosis-row").forEach(function(r){ r.querySelectorAll("input").forEach(function(i){ i.value=""; }); });
  document.querySelectorAll(".drug-row").forEach(function(r){ var di=r.querySelector(".drug-input"),qi=r.querySelector(".drug-qty"); if(di)di.value=""; if(qi)qi.value=""; });
  ["treatmentPlace","notes","dataEntryInput","receipt","amount"].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=""; });
  ["animal_goat","animal_sheep","animal_cow","animal_camel","animal_horse","animal_cat","animal_dog","animal_poultry"].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=""; });
}

function collectFormData() {
  var data = {
    caseNumber:getValue("caseNumber"), mirrorCaseNumber:getValue("mirrorCaseNumber"),
    phone:getValue("phoneInput"), name:getValue("nameInput"), possession:getValue("possessionInput"),
    region:getValue("regionInput"), civil:getValue("civilInput"), treatmentPlace:getValue("treatmentPlace"),
    notes:getValue("notes"), dataEntry:getValue("dataEntryInput"), dataUpdater:getValue("dataUpdaterInput"),
    financialDate:getValue("financialDate"), receipt:getValue("receipt"), amount:getValue("amount"),
    diseases:[], types:[], diseaseCounts:[], drugs:[], drugQuantities:[],
    animals:{goat:getValue("animal_goat"),sheep:getValue("animal_sheep"),cow:getValue("animal_cow"),
      camel:getValue("animal_camel"),horse:getValue("animal_horse"),cat:getValue("animal_cat"),
      dog:getValue("animal_dog"),poultry:getValue("animal_poultry")}
  };
  document.querySelectorAll(".diagnosis-row").forEach(function(r){ var inp=r.querySelectorAll("input"); data.diseases.push(inp[0]?inp[0].value:""); data.types.push(inp[1]?inp[1].value:""); data.diseaseCounts.push(inp[2]?inp[2].value:""); });
  document.querySelectorAll(".drug-row").forEach(function(r){ var di=r.querySelector(".drug-input"),qi=r.querySelector(".drug-qty"); data.drugs.push(di?di.value:""); data.drugQuantities.push(qi?qi.value:""); });
  return data;
}

function updateMirrorCaseNumber() { var v=getValue("caseNumber"); if(v) document.getElementById("mirrorCaseNumber").value=v; }

// ===== Load daily table =====
async function loadData() {
  try {
    var res = await callApi("getAAAData");
    var tbl = document.getElementById("dataTable"); tbl.innerHTML = "";
    if (!res.success || !res.data || res.data.length <= 1) { tbl.innerHTML = "<tr><td colspan='7'>لا توجد بيانات لليوم</td></tr>"; return; }
    var h = "<thead><tr>"; res.data[0].forEach(function(c){ h+="<th>"+(c||"")+"</th>"; }); h += "</tr></thead>";
    var b = "<tbody>";
    for (var i=1;i<res.data.length;i++) {
      var isIncomplete = (res.data[i][6]+"").indexOf("البيانات ناقصة") > -1;
      b += isIncomplete ? '<tr class="data-missing">' : '<tr style="background-color:#c8f7c5;">';
      res.data[i].forEach(function(c){ b+="<td>"+(c===""?" ":c)+"</td>"; });
      b += "</tr>";
    }
    tbl.innerHTML = h + b + "</tbody>";
  } catch(err) { showMessage("خطأ في تحميل الجدول: " + err.message, true); }
}

// ===== Load dropdowns =====
async function loadDropdowns() {
  try {
    var results = await Promise.all([
      callApi("getPhoneNumbers"), callApi("getDiseases"), callApi("getDrugs"), callApi("getDataEntryOptions")
    ]);
    function fillDL(id, data) {
      var dl = document.getElementById(id); dl.innerHTML = "";
      (data||[]).sort().forEach(function(v){ var o=document.createElement("option"); o.value=v; dl.appendChild(o); });
    }
    if(results[0].success) fillDL("phoneList", results[0].data);
    if(results[1].success) fillDL("diseaseList", results[1].data);
    if(results[2].success) fillDL("drugList", results[2].data);
    if(results[3].success) {
      fillDL("dataEntryList", results[3].data);
      fillDL("dataUpdaterList", results[3].data);
    }
  } catch(err) { showMessage("خطأ في تحميل القوائم: " + err.message, true); }
}

// ===== CRUD =====
async function saveData() {
  showConfirm("هل تريد حفظ البيانات؟", async function() {
    var data = collectFormData();
    var btn = document.getElementById("saveBtn"), orig = btn.textContent;
    btn.textContent = "جاري الحفظ..."; btn.disabled = true;
    try {
      var res = await callApi("saveData", { data: data });
      if(res.success) { showMessage("✅ تم الحفظ بنجاح", false); clearForm(); loadData(); }
      else showMessage(res.message, true);
    } catch(err) { showMessage("خطأ: " + err.message, true); }
    finally { btn.textContent = orig; btn.disabled = false; }
  });
}

async function updateData() {
  if(!getValue("caseNumber")) { showMessage("الرجاء إدخال رقم الحالة", true); return; }
  showConfirm("هل تريد تحديث البيانات؟", async function() {
    var data = collectFormData();
    var btn = document.getElementById("updateBtn"), orig = btn.textContent;
    btn.textContent = "جاري التحديث..."; btn.disabled = true;
    try {
      var res = await callApi("updateData", { data: data });
      if(res.success) { showMessage("✅ تم التحديث بنجاح", false); clearForm(); loadData(); }
      else showMessage(res.message, true);
    } catch(err) { showMessage("خطأ: " + err.message, true); }
    finally { btn.textContent = orig; btn.disabled = false; }
  });
}

async function deleteCase() {
  var cn = getValue("caseNumber");
  if(!cn) { showMessage("الرجاء إدخال رقم الحالة", true); return; }
  showConfirm("هل أنت متأكد من حذف الحالة " + cn + "؟", async function() {
    var btn = document.getElementById("deleteBtn"), orig = btn.textContent;
    btn.textContent = "جاري الحذف..."; btn.disabled = true;
    try {
      var res = await callApi("deleteData", { caseNumber: cn });
      if(res.success) { showMessage("✅ تم الحذف بنجاح", false); clearForm(); loadData(); }
      else showMessage(res.message, true);
    } catch(err) { showMessage("خطأ: " + err.message, true); }
    finally { btn.textContent = orig; btn.disabled = false; }
  });
}

async function searchCase() {
  var cn = getValue("caseNumber");
  if(!cn) { showMessage("الرجاء إدخال رقم الحالة", true); return; }
  showMessage("⏳ جاري الجلب...", false);
  try {
    var res = await callApi("searchCaseData", { caseNumber: cn });
    if(res.success) { fillFormWithData(res); loadData(); showMessage("✅ تم التحميل بنجاح", false); }
    else showMessage(res.message, true);
  } catch(err) { showMessage("خطأ: " + err.message, true); }
}

// Temp save/update
async function tempSave() {
  var data = collectFormData();
  if(!data.phone.trim()) { showMessage("❌ رقم الهاتف مطلوب", true); return; }
  if(!data.dataEntry.trim()) { showMessage("❌  مطلوب", true); return; }
  try {
    var res = await callApi("saveTempData", { data: data });
    if(res.success) { showMessage(res.message, false); clearForm(); loadData(); }
    else showMessage(res.message, true);
  } catch(err) { showMessage("خطأ: " + err.message, true); }
}

async function tempUpdate() {
  var data = collectFormData();
  if(!data.caseNumber.trim()) { showMessage("❌ رقم الحالة مطلوب", true); return; }
  if(!data.phone.trim()) { showMessage("❌ رقم الهاتف مطلوب", true); return; }
  if(!data.dataUpdater.trim()) { showMessage("❌  مطلوب", true); return; }
  try {
    var res = await callApi("updateTempData", { data: data });
    if(res.success) { showMessage(res.message, false); clearForm(); loadData(); }
    else showMessage(res.message, true);
  } catch(err) { showMessage("خطأ: " + err.message, true); }
}

// Receipt check
async function checkReceipt() {
  var rn = getValue("receipt"); if(!rn) return;
  try {
    var res = await callApi("checkReceiptNumber", { receiptNumber: rn });
    if(res.exists) {
      showMessage("❌ رقم الإيصال موجود مسبقاً", true);
      var el = document.getElementById("receipt");
      el.style.backgroundColor = "#ffcccc"; el.style.border = "2px solid red";
      setTimeout(function(){ el.style.backgroundColor=""; el.style.border=""; }, 3000);
    }
  } catch(err) {}
}

// ===== Search in treatment records =====
async function performSearch() {
  var kw = getValue("searchKeyword"), sd = getValue("searchStartDate"), ed = getValue("searchEndDate");
  if(!kw && !sd && !ed) { document.getElementById("searchTable").innerHTML = ""; return; }
  try {
    var res = await callApi("searchInTreatmentSheet", { keyword:kw, startDate:sd, endDate:ed });
    var tbl = document.getElementById("searchTable"); tbl.innerHTML = "";
    if(!res.success || !res.data || res.data.length <= 1) { tbl.innerHTML = "<tr><td>لا توجد نتائج</td></tr>"; return; }
    var h = "<thead><tr>"; res.data[0].forEach(function(c){ h+="<th>"+c+"</th>"; }); h += "</tr></thead>";
    var b = "<tbody>";
    for(var i=1;i<res.data.length;i++) { b+="<tr>"; res.data[i].forEach(function(c){ b+="<td>"+(c||"")+"</td>"; }); b+="</tr>"; }
    tbl.innerHTML = h + b + "</tbody>";
  } catch(err) { showMessage("خطأ في البحث: " + err.message, true); }
}

// ===== Animals Report =====
async function loadAnimalsReport() {
  var start = getValue("animalsStartDate"), end = getValue("animalsEndDate");
  try {
    var res = await callApi("getAnimalsReport", { startDate:start, endDate:end });
    var tbl = document.getElementById("animalsReportTable"); tbl.innerHTML = "";
    if(!res.success || !res.data || res.data.length === 0) { tbl.innerHTML = "<tr><td>لا توجد بيانات</td></tr>"; return; }
    var html = "<thead><tr>"; res.data[0].forEach(function(h){ html+="<th>"+h+"</th>"; }); html+="</tr></thead>";
    html += "<tbody><tr>"; res.data[1].forEach(function(v){ html+="<td>"+v+"</td>"; }); html+="</tr></tbody>";
    tbl.innerHTML = html;
  } catch(err) { showMessage("خطأ: " + err.message, true); }
}

// ===== Show/Hide Cards =====
function showOnlyCard(id) {
  document.querySelectorAll(".right-panel .card").forEach(function(c){ c.style.display="none"; });
  document.getElementById(id).style.display = "block";
}
function showAllCards() {
  document.querySelectorAll(".right-panel .card").forEach(function(c){
    if(c.id!=="searchCard" && c.id!=="animalsReportCard") c.style.display="flex";
  });
  document.getElementById("searchCard").style.display = "none";
  document.getElementById("animalsReportCard").style.display = "none";
}

// ===== Bind Events =====
function bindEvents() {
  document.getElementById("saveBtn").onclick = saveData;
  document.getElementById("updateBtn").onclick = updateData;
  document.getElementById("clearBtn").onclick = clearForm;
  document.getElementById("deleteBtn").onclick = deleteCase;
  document.getElementById("searchBtn").onclick = searchCase;
  document.getElementById("tempSaveBtn").onclick = tempSave;
  document.getElementById("tempUpdateBtn").onclick = tempUpdate;
  document.getElementById("receipt").addEventListener("blur", checkReceipt);

  document.getElementById("phoneInput").addEventListener("change", function() {
    showMessage("⏳ جاري جلب بيانات المربي...", false);
    fetchBreederData(this.value.trim());
  });

  document.getElementById("caseNumber").addEventListener("input", updateMirrorCaseNumber);
  document.getElementById("caseNumber").addEventListener("change", function() {
    updateMirrorCaseNumber();
    var cn = this.value.trim(); if(!cn) return;
    showMessage("⏳ جاري الجلب...", false);
    searchCase();
  });

  // Daily table row click
  document.getElementById("dataTable").addEventListener("click", async function(e) {
    var row = e.target.closest("tr"); if(!row) return;
    var cell = row.cells[0]; if(!cell) return;
    var cn = cell.textContent.trim(); if(!cn) return;
    document.getElementById("caseNumber").value = cn;
    showMessage("⏳ جاري الجلب...", false);
    try {
      var res = await callApi("searchCaseData", { caseNumber: cn });
      if(res.success) { fillFormWithData(res); loadData(); showMessage("✅ تم التحميل", false); }
      else showMessage(res.message, true);
    } catch(err) { showMessage("خطأ: " + err.message, true); }
  });

  // Search card
  document.getElementById("searchRecordBtn").onclick = function(){ showOnlyCard("searchCard"); };
  document.getElementById("backToMainBtn").onclick = showAllCards;
  var searchTimeout;
  document.getElementById("searchKeyword").addEventListener("input", function(){ clearTimeout(searchTimeout); searchTimeout=setTimeout(performSearch,400); });
  document.getElementById("searchStartDate").addEventListener("change", performSearch);
  document.getElementById("searchEndDate").addEventListener("change", performSearch);
  document.getElementById("clearSearchDatesBtn").addEventListener("click", function(){ document.getElementById("searchStartDate").value=""; document.getElementById("searchEndDate").value=""; performSearch(); });

  // Animals report
  document.getElementById("mainMenuBtn").onclick = function(){ showOnlyCard("animalsReportCard"); loadAnimalsReport(); };
  document.getElementById("backFromAnimalsBtn").onclick = showAllCards;
  document.getElementById("animalsStartDate").addEventListener("change", loadAnimalsReport);
  document.getElementById("animalsEndDate").addEventListener("change", loadAnimalsReport);
  document.getElementById("clearAnimalsDatesBtn").addEventListener("click", function(){ document.getElementById("animalsStartDate").value=""; document.getElementById("animalsEndDate").value=""; loadAnimalsReport(); });
}

// ===== Init =====
function init() {
  bindEvents();
  document.getElementById("financialDate").value = new Date().toLocaleDateString("en-CA");
  if (API_URL) { loadDropdowns(); loadData(); }
}

if (API_URL) init();
else bindEvents();
</script>
